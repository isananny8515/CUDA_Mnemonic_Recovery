name: release-build-bundles

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CUDA_VERSION: "12.8.0"

jobs:
  build-linux:
    name: Linux ${{ matrix.label }}
    runs-on: ubuntu-latest
    container:
      image: nvidia/cuda:12.8.0-devel-ubuntu22.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: sm_61-dlto
            archs: "61"
            family: "GTX 10xx / Pascal"
          - label: sm_75-dlto
            archs: "75"
            family: "RTX 20xx / Turing"
          - label: sm_86-dlto
            archs: "86"
            family: "RTX 30xx / Ampere"
          - label: sm_89-dlto
            archs: "89"
            family: "RTX 40xx / Ada"
          - label: sm_120-dlto
            archs: "120"
            family: "RTX 50xx / Blackwell"
          - label: universal-sm_86-sm_120-dlto
            archs: "86;89;120"
            family: "One binary for RTX 30xx / 40xx / 50xx"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build tools
        run: |
          apt-get update
          apt-get install -y cmake ninja-build g++ make zip tar

      - name: Configure
        run: >-
          cmake --preset linux-release
          -D CMAKE_CUDA_ARCHITECTURES="${{ matrix.archs }}"
          -D CUDA_MNEMONIC_RECOVERY_ENABLE_DLTO=ON

      - name: Build
        run: cmake --build --preset linux-release

      - name: Package
        run: |
          set -euo pipefail
          PKG_DIR="out/pkg/linux/${{ matrix.label }}"
          mkdir -p "$PKG_DIR"
          cp out/build/linux-release/bin/CUDA_Mnemonic_Recovery "$PKG_DIR/CUDA_Mnemonic_Recovery"
          cp README.md README.ru.md LICENSE.txt THIRD_PARTY_NOTICES.md RESPONSIBLE_USE.md SECURITY.md "$PKG_DIR/"
          cp -R examples "$PKG_DIR/examples"
          cat > "$PKG_DIR/BUILD.txt" <<EOF
          CUDA_Mnemonic_Recovery build profile
          Platform: Linux
          CUDA Toolkit: ${CUDA_VERSION}
          Architecture profile: ${{ matrix.label }}
          CUDA architectures: ${{ matrix.archs }}
          Device LTO: enabled
          Intended hardware: ${{ matrix.family }}
          Runtime notes: static CUDA runtime is enabled. A compatible NVIDIA driver is still required.
          Universal note: the universal sm_86-sm_120 bundle covers RTX 30xx through RTX 50xx. RTX 20xx uses the dedicated sm_75 build.
          EOF

      - name: Upload packaged build
        uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.label }}
          path: out/pkg/linux/${{ matrix.label }}
          if-no-files-found: error

  build-windows:
    name: Windows ${{ matrix.label }}
    runs-on: windows-2022
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: sm_61-dlto
            archs: "61"
            family: "GTX 10xx / Pascal"
          - label: sm_75-dlto
            archs: "75"
            family: "RTX 20xx / Turing"
          - label: sm_86-dlto
            archs: "86"
            family: "RTX 30xx / Ampere"
          - label: sm_89-dlto
            archs: "89"
            family: "RTX 40xx / Ada"
          - label: sm_120-dlto
            archs: "120"
            family: "RTX 50xx / Blackwell"
          - label: universal-sm_86-sm_120-dlto
            archs: "86;89;120"
            family: "One binary for RTX 30xx / 40xx / 50xx"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install CUDA Toolkit
        uses: Jimver/cuda-toolkit@v0.2.30
        with:
          cuda: "12.8.0"
          method: "network"

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Configure
        shell: powershell
        run: >-
          cmake --preset windows-release
          -D CMAKE_CUDA_ARCHITECTURES='${{ matrix.archs }}'
          -D CUDA_MNEMONIC_RECOVERY_ENABLE_DLTO=ON

      - name: Build
        shell: powershell
        run: cmake --build --preset windows-release --config Release -- /m:1

      - name: Package
        shell: powershell
        run: |
          $pkgDir = Join-Path $pwd "out/pkg/windows/${{ matrix.label }}"
          New-Item -ItemType Directory -Force -Path $pkgDir | Out-Null
          $binary = Get-ChildItem -Recurse (Join-Path $pwd "out/build/windows-release/bin") -Filter "CUDA_Mnemonic_Recovery.exe" | Select-Object -First 1
          if (-not $binary) { throw "Built executable not found." }
          Copy-Item $binary.FullName (Join-Path $pkgDir "CUDA_Mnemonic_Recovery.exe") -Force
          Copy-Item README.md, README.ru.md, LICENSE.txt, THIRD_PARTY_NOTICES.md, RESPONSIBLE_USE.md, SECURITY.md $pkgDir -Force
          Copy-Item examples (Join-Path $pkgDir "examples") -Recurse -Force
          @"
          CUDA_Mnemonic_Recovery build profile
          Platform: Windows
          CUDA Toolkit: $env:CUDA_VERSION
          Architecture profile: ${{ matrix.label }}
          CUDA architectures: ${{ matrix.archs }}
          Device LTO: enabled
          Intended hardware: ${{ matrix.family }}
          Runtime notes: static MSVC runtime and static CUDA runtime are enabled. A compatible NVIDIA driver is still required.
          Universal note: the universal sm_86-sm_120 bundle covers RTX 30xx through RTX 50xx. RTX 20xx uses the dedicated sm_75 build.
          "@ | Set-Content (Join-Path $pkgDir "BUILD.txt")

      - name: Upload packaged build
        uses: actions/upload-artifact@v4
        with:
          name: windows-${{ matrix.label }}
          path: out/pkg/windows/${{ matrix.label }}
          if-no-files-found: error

  bundle:
    name: Bundle release archives
    runs-on: ubuntu-latest
    needs:
      - build-linux
      - build-windows
    steps:
      - name: Download Linux builds
        uses: actions/download-artifact@v4
        with:
          pattern: linux-*
          path: dist/linux
          merge-multiple: false

      - name: Download Windows builds
        uses: actions/download-artifact@v4
        with:
          pattern: windows-*
          path: dist/windows
          merge-multiple: false

      - name: Create archives
        run: |
          set -euo pipefail
          cd dist
          zip -rq ../CUDA_Mnemonic_Recovery-windows-builds.zip windows
          tar -czf ../CUDA_Mnemonic_Recovery-linux-builds.tar.gz linux
          sha256sum ../CUDA_Mnemonic_Recovery-windows-builds.zip > ../CUDA_Mnemonic_Recovery-windows-builds.zip.sha256
          sha256sum ../CUDA_Mnemonic_Recovery-linux-builds.tar.gz > ../CUDA_Mnemonic_Recovery-linux-builds.tar.gz.sha256

      - name: Upload final archives
        uses: actions/upload-artifact@v4
        with:
          name: release-bundles
          path: |
            CUDA_Mnemonic_Recovery-windows-builds.zip
            CUDA_Mnemonic_Recovery-windows-builds.zip.sha256
            CUDA_Mnemonic_Recovery-linux-builds.tar.gz
            CUDA_Mnemonic_Recovery-linux-builds.tar.gz.sha256

      - name: Publish tagged release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            CUDA_Mnemonic_Recovery-windows-builds.zip
            CUDA_Mnemonic_Recovery-windows-builds.zip.sha256
            CUDA_Mnemonic_Recovery-linux-builds.tar.gz
            CUDA_Mnemonic_Recovery-linux-builds.tar.gz.sha256
