name: build-smoke

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  linux:
    name: Linux ${{ matrix.label }}
    runs-on: ubuntu-latest
    container:
      image: nvidia/cuda:12.8.0-devel-ubuntu22.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: sm_89-dlto
            archs: "89"
          - label: universal-sm_86-sm_120-dlto
            archs: "86;89;120"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build tools
        run: |
          apt-get update
          apt-get install -y cmake ninja-build g++ make

      - name: Configure
        run: >-
          cmake --preset linux-release
          -D CMAKE_CUDA_ARCHITECTURES="${{ matrix.archs }}"
          -D CUDA_MNEMONIC_RECOVERY_ENABLE_DLTO=ON

      - name: Build
        run: cmake --build --preset linux-release

  windows:
    name: Windows ${{ matrix.label }}
    runs-on: windows-2022
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: sm_89-dlto
            archs: "89"
          - label: universal-sm_86-sm_120-dlto
            archs: "86;89;120"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install CUDA Toolkit
        uses: Jimver/cuda-toolkit@v0.2.30
        with:
          cuda: "12.8.0"
          method: "network"

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Configure
        shell: powershell
        run: >-
          cmake --preset windows-release
          -D CMAKE_CUDA_ARCHITECTURES='${{ matrix.archs }}'
          -D CUDA_MNEMONIC_RECOVERY_ENABLE_DLTO=ON

      - name: Build
        shell: powershell
        run: cmake --build --preset windows-release --config Release -- /m:1
