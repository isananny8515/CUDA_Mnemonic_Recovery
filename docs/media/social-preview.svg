<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-labelledby="title desc">
  <title id="title">CUDA Mnemonic Recovery Social Preview</title>
  <desc id="desc">Compact social preview image for CUDA_Mnemonic_Recovery.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#08111f"/>
      <stop offset="58%" stop-color="#10203d"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="pill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="22" flood-color="#020617" flood-opacity="0.45"/>
    </filter>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>
  <circle cx="140" cy="118" r="190" fill="#38bdf8" opacity="0.10"/>
  <circle cx="1118" cy="556" r="220" fill="#22c55e" opacity="0.08"/>

  <rect x="54" y="54" width="1172" height="532" rx="30" fill="#0b1321" opacity="0.88" stroke="#1e293b"/>

  <g filter="url(#shadow)">
    <rect x="92" y="118" width="474" height="278" rx="22" fill="#0a0f1a" stroke="#1f2937"/>
    <rect x="92" y="118" width="474" height="42" rx="22" fill="#111827"/>
    <circle cx="122" cy="139" r="6" fill="#ef4444"/>
    <circle cx="141" cy="139" r="6" fill="#f59e0b"/>
    <circle cx="160" cy="139" r="6" fill="#22c55e"/>
    <text x="114" y="192" fill="#93c5fd" font-family="JetBrains Mono, Consolas, monospace" font-size="18">CUDA_Mnemonic_Recovery -device 0,1,2,3</text>
    <text x="114" y="228" fill="#cbd5e1" font-family="JetBrains Mono, Consolas, monospace" font-size="17">-recovery -i templates.txt</text>
    <text x="114" y="262" fill="#cbd5e1" font-family="JetBrains Mono, Consolas, monospace" font-size="17">-d derivations.txt -c cusrxeStT</text>
    <text x="114" y="296" fill="#cbd5e1" font-family="JetBrains Mono, Consolas, monospace" font-size="17">-hash 1a4603d1... -d_type 3</text>
    <text x="114" y="348" fill="#22c55e" font-family="JetBrains Mono, Consolas, monospace" font-size="16">[!] Recovery summary: tested=33554432 checksum-valid=2097152</text>
  </g>

  <g>
    <text x="622" y="154" fill="#93c5fd" font-family="Segoe UI, Arial, sans-serif" font-size="22" letter-spacing="2">CUDA • BIP39 • MULTI-GPU</text>

    <text x="622" y="234" fill="#f8fafc" font-family="Segoe UI, Arial, sans-serif" font-size="58" font-weight="700">CUDA Mnemonic</text>
    <text x="622" y="292" fill="#f8fafc" font-family="Segoe UI, Arial, sans-serif" font-size="58" font-weight="700">Recovery</text>

    <text x="622" y="352" fill="#cbd5e1" font-family="Segoe UI, Arial, sans-serif" font-size="26">Recover incomplete BIP39 phrases, validate against</text>
    <text x="622" y="388" fill="#cbd5e1" font-family="Segoe UI, Arial, sans-serif" font-size="26">real targets, and scale cleanly from one GPU to many.</text>

    <rect x="622" y="448" width="392" height="62" rx="31" fill="url(#pill)"/>
    <text x="662" y="488" fill="#04101d" font-family="Segoe UI, Arial, sans-serif" font-size="27" font-weight="700">Bitcoin • Ethereum • Solana • TON</text>

    <text x="622" y="560" fill="#94a3b8" font-family="Segoe UI, Arial, sans-serif" font-size="22">Recovery-first public release for practical wallet work.</text>
  </g>
</svg>
